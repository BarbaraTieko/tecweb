{% extends "funfacts/base.html" %}

{% block content %}

<form method="post">
  {%csrf_token%}
  <label for="texto">Fun Fact</label>
  <textarea id="texto" name="texto"></textarea>
  <input type="submit" />
</form>

<p>Quantidade de Fun Facts cadastrados: {{total}}</p>
{% if funfact %}
<ul>
  <li>{{funfact.text}}</li>
</ul>
{% else %}
<ul>
  <li>Nenhum Fun fact cadastrado</li>
</ul>
{% endif %}

{% endblock %}
